name: CD Frontend AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'eu-north-1' }}
  TERRAFORM_VERSION: "1.9.8"
  TF_WORKING_DIR: infra/terraform
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'tp-3tiers-frontend' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-west-3' }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT || 'prod' }}

jobs:
  deploy:
    name: Build and deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Terraform state region: ${{ env.TF_STATE_REGION }}"
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY || 'frontend/terraform.tfstate' }}" \
            -backend-config="region=${{ env.TF_STATE_REGION }}"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "bucket=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "url=$(terraform output -raw cloudfront_url)" >> "$GITHUB_OUTPUT"

      - name: Sync files to S3
        run: aws s3 sync dist "s3://${{ steps.tf_outputs.outputs.bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.tf_outputs.outputs.distribution_id }}" --paths "/*"

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.tf_outputs.outputs.url }}"
